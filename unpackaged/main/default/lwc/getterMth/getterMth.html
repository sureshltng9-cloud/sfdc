<template>
    <lightning-card title="BMI Calculator">
        <lightning-input type="number"  step="0.01" label="Enter Weight in KG's" onchange={weightHandler}></lightning-input>
        <lightning-input type="number" step="0.01" label="Enter Height in Meters" onchange={heightHandler}></lightning-input>
        <lightning-button label="Get BMI" onclick={calculateBmi}></lightning-button>
        {bmiValue}
    </lightning-card>
</template>
