<template>
    <lightning-card>
        <div class="slds-m-top_medium slds-m-bottom_large">
            <h2 class="slds-text-heading_medium slds-m-bottom_medium">Show Toast Notification</h2>
        </div>
        <lightning-button-group>
            <lightning-button label="Success" onclick={successHandler}></lightning-button>
            <lightning-button label="Error" onclick={errorHandler}></lightning-button>
            <lightning-button label="Waring" onclick={warningHandler}></lightning-button>
            <lightning-button label="Info" onclick={infoHandler}></lightning-button>
        </lightning-button-group>
    </lightning-card>
</template>
