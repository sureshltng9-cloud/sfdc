<template>
    <lightning-card>
        <div class="slds-var-m-around_medium">
            <lightning-input label="Enter Key" onchange={keyHandler}></lightning-input>
        </div>
        <div class="slds-var-m-around_medium" if:true={check}>
            <lightning-datatable key-field="Id" data={data} columns={columns}></lightning-datatable>
        </div>
    </lightning-card>
</template>
